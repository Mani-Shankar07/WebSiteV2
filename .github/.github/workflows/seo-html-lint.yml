name: SEO & HTML Validation Linting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows you to run it manually anytime

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the latest repository code targeting the correct Node environment
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # 2. Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install and run HTMLHint to check for SEO/HTML structural issues
      - name: Run HTMLHint
        run: |
          npm install -g htmlhint
          htmlhint "**/*.html" --rules "tagname-lowercase=true,attr-value-not-empty=true,alt-require=true,doctype-first=true,id-unique=true"
